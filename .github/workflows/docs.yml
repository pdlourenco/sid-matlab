name: Docs

on:
  push:
    branches:
      - main
      - claude/plan-sid-docs-website-vFMRn
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install sid (with plot extras)
        run: pip install -e "./python[plot]"

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Build site
        env:
          DISABLE_MKDOCS_2_WARNING: 'true'
        run: mkdocs build

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
