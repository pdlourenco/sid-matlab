name: MATLAB/Octave tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'matlab/**.m'
  pull_request:
    branches: [main]
    paths:
      - 'matlab/**.m'

permissions:
  contents: write

jobs:
  octave:
    name: Octave tests & examples
    runs-on: ubuntu-latest
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install GNU Octave and xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y octave xvfb

      - name: Run test suite
        run: xvfb-run octave --no-gui --eval "run('matlab/tests/runAllTests.m')"

      - name: Run examples
        run: xvfb-run octave --no-gui --eval "run('matlab/examples/runAllExamples.m')"

  matlab:
    name: MATLAB tests & examples
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      # Note: matlab-actions v2 uses Node.js 20 (deprecated June 2026).
      # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 runs them on Node 24 instead.
      # Upgrade to v3 when MathWorks releases it.
      - name: Set up MATLAB with toolboxes
        uses: matlab-actions/setup-matlab@v2.7.0
        with:
          release: R2025a
          products: System_Identification_Toolbox Signal_Processing_Toolbox

      - name: Run test suite
        uses: matlab-actions/run-command@v2.4.1
        with:
          command: run('matlab/tests/runAllTests.m')

      - name: Run examples
        uses: matlab-actions/run-command@v2.4.1
        with:
          command: run('matlab/examples/runAllExamples.m')

      - name: Generate cross-language reference data
        uses: matlab-actions/run-command@v2.4.1
        with:
          command: run('testdata/generate_reference.m')

      - name: Commit reference data if changed
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add testdata/*.json
          git diff --staged --quiet && exit 0
          git commit -m "Update cross-language reference data [skip ci]"
          for attempt in 1 2; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            echo "Attempt $attempt failed, retrying..."
            sleep 5
          done
          echo "Failed to push after retries" >&2
          exit 1
