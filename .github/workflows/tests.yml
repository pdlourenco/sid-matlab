name: Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  octave-tests:
    name: Run tests (Octave)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install GNU Octave and xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y octave xvfb

      - name: Run test suite
        run: xvfb-run octave --no-gui --eval "run('tests/runAllTests.m')"

  matlab-tests:
    name: Run tests (MATLAB)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      # Note: matlab-actions v2 uses Node.js 20 (deprecated June 2026).
      # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 runs them on Node 24 instead.
      # Upgrade to v3 when MathWorks releases it.
      - name: Set up MATLAB with toolboxes
        uses: matlab-actions/setup-matlab@v2.7.0
        with:
          products: System_Identification_Toolbox Signal_Processing_Toolbox

      - name: Run test suite
        uses: matlab-actions/run-command@v2.4.1
        with:
          command: run('tests/runAllTests.m')

  octave-examples:
    name: Run examples (Octave)
    needs: octave-tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install GNU Octave and xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y octave xvfb

      - name: Run examples
        run: xvfb-run octave --no-gui --eval "run('examples/runAllExamples.m')"

  matlab-examples:
    name: Run examples (MATLAB)
    needs: matlab-tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2.7.0

      - name: Run examples
        uses: matlab-actions/run-command@v2.4.1
        with:
          command: run('examples/runAllExamples.m')
