name: Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  octave-tests:
    name: Run tests (Octave)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GNU Octave and xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y octave xvfb

      - name: Run test suite
        run: xvfb-run octave --no-gui --eval "run('tests/runAllTests.m')"
