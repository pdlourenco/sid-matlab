name: Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  octave-tests:
    name: Run tests (Octave)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GNU Octave and xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y octave xvfb

      - name: Run test suite
        run: xvfb-run octave --no-gui --eval "run('tests/runAllTests.m')"

  matlab-tests:
    name: Run tests (MATLAB)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB with System Identification Toolbox
        uses: matlab-actions/setup-matlab@v2
        with:
          products: System_Identification_Toolbox

      - name: Run test suite
        uses: matlab-actions/run-command@v2
        with:
          command: run('tests/runAllTests.m')
