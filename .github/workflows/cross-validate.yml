name: Cross-Language Validation

# Validates numerical equivalence across language implementations.
# Reference data (testdata/*.json) is generated by the MATLAB job in
# tests.yml and committed to the repository.  Each job below loads
# those JSON files, re-runs the sid functions under its own engine,
# and checks that outputs match within tolerance.
#
# The workflow triggers broadly, but each job uses a path condition
# so that only the relevant validators run.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'matlab/**.m'
      - 'testdata/**'
      - 'python/**'
      - 'julia/**'
  pull_request:
    branches: [main]
    paths:
      - 'matlab/**.m'
      - 'testdata/**'
      - 'python/**'
      - 'julia/**'

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      matlab: ${{ steps.filter.outputs.matlab }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            matlab:
              - 'matlab/**.m'
              - 'testdata/**'
            python:
              - 'python/**'
              - 'testdata/**'

  octave:
    name: Validate Octave against MATLAB reference
    needs: changes
    if: needs.changes.outputs.matlab == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install GNU Octave
        run: |
          sudo apt-get update
          sudo apt-get install -y octave

      - name: Run cross-language validation
        run: octave --no-gui --eval "run('testdata/validate_reference.m')"

  validate-python:
    name: Validate Python port
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install sid Python package
        run: pip install -e "./python[dev]"

      - name: Run cross-validation tests
        run: python -m pytest python/tests/test_cross_validation.py -v

  # Future: validate-julia job (Phase 3)
