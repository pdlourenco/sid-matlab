name: Cross-Language Validation

# Validates numerical equivalence across language implementations.
# Reference data is generated by the MATLAB job in tests.yml and committed
# to testdata/*.json.  Each language job below loads those JSON files and
# verifies its own outputs match within the specified tolerances.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'testdata/*.json'
      - 'python/**'
      - 'julia/**'
  pull_request:
    branches: [main]
    paths:
      - 'testdata/*.json'
      - 'python/**'
      - 'julia/**'

