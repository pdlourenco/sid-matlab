name: Python Tests

on:
  workflow_dispatch:
  push:
    paths:
      - 'python/**'
      - 'testdata/**'
  pull_request:
    branches: [main]
    paths:
      - 'python/**'
      - 'testdata/**'

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e "./python[dev]"

      - name: Run unit tests
        run: python -m pytest python/tests/ -v --tb=short -k "not cross_validation"

      - name: Run cross-validation tests (if reference data exists)
        run: |
          if ls testdata/*.json 1>/dev/null 2>&1; then
            python -m pytest python/tests/test_cross_validation.py -v --tb=short
          else
            echo "No reference JSON files found — skipping cross-validation."
          fi

      - name: Run example notebooks
        run: python -m pytest --nbmake python/examples/ -v --tb=short
