name: Lint

on:
  push:
  pull_request:
    branches: [main]

jobs:
  miss-hit:
    name: Style & lint check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MISS_HIT
        run: pip install miss-hit

      - name: Code quality (mh_lint)
        run: mh_lint .

      - name: Style check (mh_style)
        run: mh_style .

      - name: Metrics check (mh_metric)
        run: mh_metric --ci .
