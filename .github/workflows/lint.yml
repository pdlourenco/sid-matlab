name: Lint

on:
  workflow_dispatch:
  push:
    paths:
      - 'matlab/**.m'
      - 'miss_hit.cfg'
      - '.github/scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'matlab/**.m'
      - 'miss_hit.cfg'
      - '.github/scripts/**'

jobs:
  miss-hit:
    name: Style & lint check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MISS_HIT
        run: pip install miss-hit

      - name: Code quality (mh_lint)
        run: mh_lint matlab/

      - name: Style check (mh_style)
        run: mh_style matlab/

      - name: Metrics check (mh_metric)
        run: mh_metric --ci matlab/

      - name: Function header standard
        run: python .github/scripts/check_headers.py
