project_root

# MISS_HIT configuration for sid-matlab
#
# Rules are tuned for MATLAB/Octave signal processing conventions:
#   - Uppercase variable names (X, U, N) are standard in control theory
#   - Scripts (tests, examples) have top-level code at column 0
#   - Semicolons suppress MATLAB console output by design
#   - Unicode in comments (author name, math symbols) is acceptable
#   - Operator spacing like varargin{k+1} and floor(nfft/2) is idiomatic

line_length: 100

# Suppress rules that conflict with MATLAB/Octave conventions
suppress_rule: "indentation"
suppress_rule: "naming_parameters"
suppress_rule: "naming_functions"
suppress_rule: "naming_scripts"
suppress_rule: "copyright_notice"
suppress_rule: "operator_whitespace"
suppress_rule: "whitespace_comma"
suppress_rule: "end_of_statements"
suppress_rule: "unicode"
suppress_rule: "operator_after_continuation"
